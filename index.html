<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grand Mission Timer</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --bg-dark: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.9);
        }

        body {
            font-family: 'Courier New', sans-serif;
            background: radial-gradient(circle at center, #1a1f25 0%, #0d1117 100%) fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            overflow: hidden;
            touch-action: none;
        }

        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .dial-outer {
            position: relative;
            width: min(92vw, 420px); 
            height: min(92vw, 420px);
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #watch-dial {
            position: absolute;
            width: 75%;
            height: 75%;
            border-radius: 50%;
            border: 4px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue), inset 0 0 15px var(--neon-blue);
            pointer-events: none;
        }

        /* 単位ラベル */
        .unit-label {
            position: absolute;
            font-size: 10px;
            color: #484f58;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
        }

        .picker-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            z-index: 30;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid #30363d;
            backdrop-filter: blur(15px);
        }

        .picker-column-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .picker-column {
            height: 120px; /* 3つ分見える高さ */
            overflow-y: scroll;
            width: 45px;
            scrollbar-width: none;
            scroll-snap-type: y mandatory;
        }
        .picker-column::-webkit-scrollbar { display: none; }
        
        .picker-item {
            height: 40px;
            line-height: 40px;
            font-size: 20px;
            color: #484f58;
            text-align: center;
            scroll-snap-align: center;
            transition: color 0.2s, text-shadow 0.2s;
        }
        .picker-item.active {
            color: var(--neon-blue);
            font-weight: bold;
            font-size: 26px;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .button-group {
            display: flex;
            gap: 15px;
            width: 85%;
        }
        button {
            flex: 1;
            padding: 18px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            color: white;
            letter-spacing: 1px;
        }
        #startBtn { background: #238636; box-shadow: 0 0 10px rgba(35, 134, 54, 0.4); }
        #stopBtn { background: #d29922; }
        #resetBtn { background: #30363d; color: #8b949e; }

        #in-app-notif {
            display: none;
            position: fixed;
            top: env(safe-area-inset-top, 20px);
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: var(--panel-bg);
            border: 2px solid var(--neon-blue);
            border-radius: 20px;
            padding: 20px;
            z-index: 4000;
            box-shadow: 0 0 30px var(--neon-blue);
            text-align: center;
        }
    </style>
</head>
<body>

<audio id="alarm-audio" src="alarm.mp3" preload="auto" loop></audio>

<div id="in-app-notif">
    <h2 style="margin:0; color:var(--neon-blue); letter-spacing:2px;">MISSION COMPLETE</h2>
    <button onclick="resetTimer()" style="margin-top:15px; width:100%; background:var(--neon-blue); color:black;">TERMINATE ALARM</button>
</div>

<div class="timer-container">
    <div class="dial-outer" id="touch-area">
        <div id="watch-dial"></div>
        <div class="picker-group" id="picker-ui">
            <div class="picker-column-wrapper">
                <span class="unit-label">HRS</span>
                <div class="picker-column" id="h-col"></div>
            </div>
            <div class="picker-column-wrapper">
                <span class="unit-label">MIN</span>
                <div class="picker-column" id="m-col"></div>
            </div>
            <div class="picker-column-wrapper">
                <span class="unit-label">SEC</span>
                <div class="picker-column" id="s-col"></div>
            </div>
        </div>
    </div>
    <div class="button-group">
        <button id="startBtn">INITIATE</button>
        <button id="stopBtn">ABORT</button>
        <button id="resetBtn">RESET</button>
    </div>
</div>

<script>
    let timerId = null;
    const alarmAudio = document.getElementById('alarm-audio');
    const pickerUI = document.getElementById('picker-ui');
    const cols = { h: document.getElementById('h-col'), m: document.getElementById('m-col'), s: document.getElementById('s-col') };
    
    // 時・分・秒の状態を個別に保持
    let state = { h: 0, m: 0, s: 0 };

    const createPicker = (col, max, key) => {
        // スムーズなループのために上下に空要素
        col.innerHTML = '<div class="picker-item"></div>';
        for (let i = 0; i <= max; i++) {
            const div = document.createElement('div');
            div.className = 'picker-item';
            div.textContent = i.toString().padStart(2, '0');
            col.appendChild(div);
        }
        col.innerHTML += '<div class="picker-item"></div>';

        col.onscroll = () => {
            const center = col.scrollTop + 60;
            const items = Array.from(col.children);
            items.forEach(item => {
                const itemCenter = item.offsetTop + 20;
                if (Math.abs(center - itemCenter) < 20) {
                    item.classList.add('active');
                    state[key] = parseInt(item.textContent) || 0;
                } else {
                    item.classList.remove('active');
                }
            });
        };
    };

    createPicker(cols.h, 23, 'h');
    createPicker(cols.m, 59, 'm');
    createPicker(cols.s, 59, 's');

    const updateDisplay = (h, m, s, behavior = 'smooth') => {
        cols.h.scrollTo({ top: h * 40, behavior: behavior });
        cols.m.scrollTo({ top: m * 40, behavior: behavior });
        cols.s.scrollTo({ top: s * 40, behavior: behavior });
    };

    function resetTimer() { location.reload(); }

    function abortTimer() {
        clearInterval(timerId);
        timerId = null;
        alarmAudio.pause();
        pickerUI.style.pointerEvents = 'auto';
    }

    document.getElementById('startBtn').onclick = () => {
        if (timerId || (state.h === 0 && state.m === 0 && state.s === 0)) return;

        // 音声準備
        alarmAudio.volume = 0;
        alarmAudio.play().then(() => { alarmAudio.pause(); alarmAudio.currentTime = 0; alarmAudio.volume = 1; });

        pickerUI.style.pointerEvents = 'none';

        timerId = setInterval(() => {
            // 正確な時計ロジック：秒が0なら分を減らす...
            if (state.s > 0) {
                state.s--;
            } else {
                if (state.m > 0) {
                    state.s = 59;
                    state.m--;
                } else {
                    if (state.h > 0) {
                        state.s = 59;
                        state.m = 59;
                        state.h--;
                    } else {
                        // タイムアップ
                        clearInterval(timerId);
                        timerId = null;
                        alarmAudio.play();
                        document.getElementById('in-app-notif').style.display = 'block';
                        return;
                    }
                }
            }
            updateDisplay(state.h, state.m, state.s);
        }, 1000);

        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({ title: 'MISSION: IN PROGRESS' });
            navigator.mediaSession.setActionHandler('pause', resetTimer);
        }
    };

    document.getElementById('stopBtn').onclick = abortTimer;
    document.getElementById('resetBtn').onclick = resetTimer;

    // タッチエリアの干渉防止
    const touchArea = document.getElementById('touch-area');
    touchArea.addEventListener('touchstart', (e) => {
        if (timerId || pickerUI.contains(e.target)) return;
        
        const rect = touchArea.getBoundingClientRect();
        const isRightSide = e.touches[0].clientX > rect.left + rect.width / 2;
        const targetCol = isRightSide ? cols.s : cols.m;
        const key = isRightSide ? 's' : 'm';

        const handle = (t) => {
            const x = t.clientX - (rect.left + rect.width / 2);
            const y = t.clientY - (rect.top + rect.height / 2);
            let angle = (Math.atan2(y, x) * (180 / Math.PI) + 450) % 360;
            const val = Math.floor(angle / 6);
            targetCol.scrollTo({ top: val * 40, behavior: 'auto' });
        };

        handle(e.touches[0]);
        const move = (me) => handle(me.touches[0]);
        window.addEventListener('touchmove', move);
        window.addEventListener('touchend', () => window.removeEventListener('touchmove', move), {once:true});
    });

    // 初期状態：3分
    setTimeout(() => updateDisplay(0, 3, 0, 'auto'), 200);
</script>
</body>
</html>
