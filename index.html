<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grand Mission Timer</title>
    <style>
        :root { --neon-blue: #00d2ff; --panel-bg: rgba(22, 27, 34, 0.9); }
        body {
            font-family: 'Courier New', sans-serif;
            background: radial-gradient(circle at center, #1a1f25 0%, #0d1117 100%) fixed;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; color: white; overflow: hidden; touch-action: none;
        }
        .timer-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .dial-outer {
            position: relative; width: min(92vw, 420px); height: min(92vw, 420px);
            margin-bottom: 20px; display: flex; justify-content: center; align-items: center;
        }
        #watch-dial {
            position: absolute; width: 75%; height: 75%; border-radius: 50%;
            border: 4px solid var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue), inset 0 0 15px var(--neon-blue);
            pointer-events: none;
        }
        .picker-group {
            display: flex; gap: 10px; z-index: 30; background: var(--panel-bg);
            padding: 15px; border-radius: 20px; border: 1px solid #30363d; backdrop-filter: blur(15px);
        }
        .picker-column {
            height: 120px; overflow-y: scroll; width: 45px;
            scrollbar-width: none; scroll-snap-type: y mandatory;
        }
        .picker-column::-webkit-scrollbar { display: none; }
        .picker-item { height: 40px; line-height: 40px; font-size: 20px; color: #484f58; text-align: center; scroll-snap-align: center; }
        .picker-item.active { color: var(--neon-blue); font-weight: bold; font-size: 26px; text-shadow: 0 0 10px var(--neon-blue); }
        .button-group { display: flex; gap: 15px; width: 85%; }
        button { flex: 1; padding: 18px; border-radius: 12px; border: none; font-weight: bold; color: white; }
        #startBtn { background: #238636; }
        #stopBtn { background: #d29922; }
        #resetBtn { background: #30363d; color: #8b949e; }
        #in-app-notif {
            display: none; position: fixed; top: env(safe-area-inset-top, 20px); left: 50%;
            transform: translateX(-50%); width: 90%; background: var(--panel-bg);
            border: 2px solid var(--neon-blue); border-radius: 20px; padding: 20px;
            z-index: 4000; box-shadow: 0 0 30px var(--neon-blue); text-align: center;
        }
    </style>
</head>
<body>

<audio id="alarm-audio" src="alarm.mp3" preload="auto" loop></audio>

<div id="in-app-notif">
    <h2 style="margin:0; color:var(--neon-blue);">MISSION COMPLETE</h2>
    <button onclick="resetTimer()" style="margin-top:15px; width:100%; background:var(--neon-blue); color:black; padding:12px; border-radius:8px; border:none; font-weight:bold;">STOP ALARM</button>
</div>

<div class="timer-container">
    <div class="dial-outer" id="touch-area">
        <div id="watch-dial"></div>
        <div class="picker-group" id="picker-ui">
            <div class="picker-column" id="h-col"></div>
            <div class="picker-column" id="m-col"></div>
            <div class="picker-column" id="s-col"></div>
        </div>
    </div>
    <div class="button-group">
        <button id="startBtn">INITIATE</button>
        <button id="stopBtn">ABORT</button>
        <button id="resetBtn">RESET</button>
    </div>
</div>

<script>
    let timerId = null;
    let endTime = null;
    const alarmAudio = document.getElementById('alarm-audio');
    const pickerUI = document.getElementById('picker-ui');
    const cols = { h: document.getElementById('h-col'), m: document.getElementById('m-col'), s: document.getElementById('s-col') };
    let state = { h: 0, m: 0, s: 0 };

    const createPicker = (col, max, key) => {
        col.innerHTML = '<div class="picker-item"></div>';
        for (let i = 0; i <= max; i++) {
            const div = document.createElement('div');
            div.className = 'picker-item';
            div.textContent = i.toString().padStart(2, '0');
            col.appendChild(div);
        }
        col.innerHTML += '<div class="picker-item"></div>';
        col.onscroll = () => {
            const center = col.scrollTop + 60;
            Array.from(col.children).forEach(item => {
                const isCenter = Math.abs(center - (item.offsetTop + 20)) < 20;
                item.classList.toggle('active', isCenter);
                if (isCenter) state[key] = parseInt(item.textContent) || 0;
            });
        };
    };

    createPicker(cols.h, 23, 'h');
    createPicker(cols.m, 59, 'm');
    createPicker(cols.s, 59, 's');

    const updateDisplay = (h, m, s, behavior = 'smooth') => {
        cols.h.scrollTo({ top: h * 40, behavior: behavior });
        cols.m.scrollTo({ top: m * 40, behavior: behavior });
        cols.s.scrollTo({ top: s * 40, behavior: behavior });
    };

    function resetTimer() { location.reload(); }
    
    function abortTimer() {
        clearInterval(timerId); timerId = null;
        alarmAudio.pause();
        alarmAudio.currentTime = 0;
        pickerUI.style.pointerEvents = 'auto';
    }

    document.getElementById('startBtn').onclick = () => {
        if (timerId || (state.h === 0 && state.m === 0 && state.s === 0)) return;

        // 【修正点】再生する「前」に音量を0にする
        alarmAudio.pause();
        alarmAudio.volume = 0;
        alarmAudio.currentTime = 0;
        
        // 再生を開始。iPhoneに「このサイトは今再生中である」という許可だけ取らせる
        const playPromise = alarmAudio.play();
        if (playPromise !== undefined) {
            playPromise.catch(e => console.log("Audio unlock failed:", e));
        }

        const totalMs = (state.h * 3600 + state.m * 60 + state.s) * 1000;
        endTime = Date.now() + totalMs;
        pickerUI.style.pointerEvents = 'none';

        timerId = setInterval(() => {
            const now = Date.now();
            const diff = Math.max(0, Math.ceil((endTime - now) / 1000));
            
            // 残り時間を表示
            updateDisplay(Math.floor(diff/3600), Math.floor((diff%3600)/60), diff%60);

            if (diff <= 0) {
                clearInterval(timerId);
                timerId = null;
                // 0秒になった瞬間にだけ音量を上げる
                alarmAudio.volume = 1.0; 
                document.getElementById('in-app-notif').style.display = 'block';
            }
        }, 1000);

        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({ title: 'TIMER RUNNING' });
            navigator.mediaSession.setActionHandler('pause', abortTimer);
        }
    };

    document.getElementById('stopBtn').onclick = abortTimer;
    document.getElementById('resetBtn').onclick = resetTimer;

    const touchArea = document.getElementById('touch-area');
    touchArea.addEventListener('touchstart', (e) => {
        if (timerId || pickerUI.contains(e.target)) return;
        const rect = touchArea.getBoundingClientRect();
        const isRight = e.touches[0].clientX > rect.left + rect.width / 2;
        const targetCol = isRight ? cols.s : cols.m;
        const handle = (t) => {
            const x = t.clientX - (rect.left + rect.width / 2);
            const y = t.clientY - (rect.top + rect.height / 2);
            let angle = (Math.atan2(y, x) * (180 / Math.PI) + 450) % 360;
            targetCol.scrollTo({ top: Math.floor(angle / 6) * 40, behavior: 'auto' });
        };
        handle(e.touches[0]);
        const move = (me) => handle(me.touches[0]);
        window.addEventListener('touchmove', move);
        window.addEventListener('touchend', () => window.removeEventListener('touchmove', move), {once:true});
    });

    setTimeout(() => updateDisplay(0, 3, 0, 'auto'), 200);
</script>
</body>
</html>
