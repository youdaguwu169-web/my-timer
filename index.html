<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grand Mission Timer</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --bg-dark: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.9);
        }

        body {
            font-family: 'Courier New', sans-serif;
            background: radial-gradient(circle at center, #1a1f25 0%, #0d1117 100%) fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            overflow: hidden;
            touch-action: none;
        }

        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .dial-outer {
            position: relative;
            width: min(92vw, 420px); 
            height: min(92vw, 420px);
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #watch-dial {
            position: absolute;
            width: 70%;
            height: 70%;
            border-radius: 50%;
            border: 4px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue), inset 0 0 15px var(--neon-blue);
            background: transparent;
        }

        .dial-label {
            position: absolute;
            color: var(--neon-blue);
            font-size: min(5.5vw, 22px);
            font-weight: bold;
            text-shadow: 0 0 10px var(--neon-blue);
            z-index: 5;
        }
        
        .label-0  { top: 5%; }
        .label-15 { right: 5%; top: 50%; transform: translateY(-50%); }
        .label-30 { bottom: 5%; }
        .label-45 { left: 5%; top: 50%; transform: translateY(-50%); }

        .picker-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            z-index: 10;
            background: var(--panel-bg);
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #30363d;
            backdrop-filter: blur(10px);
            width: min(50vw, 190px);
        }

        .picker-column {
            height: 80px;
            overflow-y: scroll;
            width: 40px;
            scrollbar-width: none;
            scroll-snap-type: y mandatory;
        }
        .picker-column::-webkit-scrollbar { display: none; }
        
        .picker-item {
            height: 40px;
            line-height: 40px;
            font-size: 18px;
            color: #484f58;
            scroll-snap-align: center;
        }
        .picker-item.active {
            color: var(--neon-blue);
            font-weight: bold;
            font-size: 24px;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .button-group {
            display: flex;
            gap: 10px;
            width: 80%;
        }
        button {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #30363d;
            font-weight: bold;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
        }
        #startBtn { background: #238636; }
        #stopBtn { background: #d29922; }
        #resetBtn { background: transparent; color: #8b949e; }

        /* サイバー風上部通知ポップアップ */
        #top-notification {
            display: none;
            position: fixed;
            top: env(safe-area-inset-top, 0); /* Notch/Dynamic Islandを避ける */
            left: 50%;
            transform: translateX(-50%);
            width: min(90%, 400px);
            background: var(--panel-bg);
            border: 2px solid var(--neon-blue);
            border-radius: 20px;
            padding: 15px 20px;
            z-index: 1000;
            text-align: center;
            box-shadow: 0 0 20px var(--neon-blue);
            backdrop-filter: blur(15px);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            animation: slideDown 0.5s forwards ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translate(-50%, -100%); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        #top-notification h2 { margin: 0 0 10px 0; color: var(--neon-blue); font-size: 18px; letter-spacing: 1px;}
        #close-notif {
            background: var(--neon-blue);
            color: black;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

<audio id="alarm-audio" src="alarm.mp3" preload="auto" loop></audio>

<div id="top-notification">
    <h2>MISSION COMPLETE</h2>
    <button id="close-notif">STOP ALARM</button>
</div>

<div class="timer-container">
    <div class="dial-outer" id="touch-area">
        <div class="dial-label label-0">60</div>
        <div class="dial-label label-15">15</div>
        <div class="dial-label label-30">30</div>
        <div class="dial-label label-45">45</div>
        <div id="watch-dial"></div>
        <div class="picker-group" id="picker-ui">
            <div class="picker-column" id="h-col"></div><span style="font-size:10px;color:#8b949e">H</span>
            <div class="picker-column" id="m-col"></div><span style="font-size:10px;color:#8b949e">M</span>
            <div class="picker-column" id="s-col"></div><span style="font-size:10px;color:#8b949e">S</span>
        </div>
    </div>
    <div class="button-group">
        <button id="startBtn">Initiate</button>
        <button id="stopBtn">Abort</button>
        <button id="resetBtn">Reset</button>
    </div>
</div>

<script>
    let timerId = null;
    const hCol = document.getElementById('h-col');
    const mCol = document.getElementById('m-col');
    const sCol = document.getElementById('s-col');
    const pickerUI = document.getElementById('picker-ui');
    const touchArea = document.getElementById('touch-area');
    const alarmAudio = document.getElementById('alarm-audio');
    const topNotification = document.getElementById('top-notification');

    // 1. ロック画面（Media Session）の統合設定
    function setupMediaSession() {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: 'Grand Mission Timer',
                artist: 'OPERATION COMPLETE',
                album: 'Cyber Alarm'
            });

            // ロック画面のメディア操作イベントをフック
            navigator.mediaSession.setActionHandler('pause', stopEverything);
            navigator.mediaSession.setActionHandler('stop', stopEverything);
            // （オプション）前後の曲ボタンを無効化
            navigator.mediaSession.setActionHandler('previoustrack', null);
            navigator.mediaSession.setActionHandler('nexttrack', null);
        }
    }

    // 2. タイマー終了時の挙动（音楽と上部通知）
    function onTimerComplete() {
        clearInterval(timerId); timerId = null;
        setupMediaSession(); // タイマー終了時にメディア情報を更新
        alarmAudio.play().catch(e => console.log("再生失敗:", e)); // 音楽再生
        topNotification.style.display = "block"; // 上部通知を表示
    }

    function stopEverything() {
        if (timerId) {
            clearInterval(timerId);
            timerId = null;
        }
        alarmAudio.pause();
        alarmAudio.currentTime = 0;
        topNotification.style.display = "none";
        pickerUI.style.pointerEvents = "auto";
        location.reload();
    }

    const createPicker = (col, max) => {
        col.innerHTML = '<div class="picker-item"></div>'; 
        for (let i = 0; i <= max; i++) {
            const div = document.createElement('div');
            div.className = 'picker-item';
            div.textContent = i.toString().padStart(2, '0');
            col.appendChild(div);
        }
        col.innerHTML += '<div class="picker-item"></div>';
        col.addEventListener('scroll', () => {
            const center = col.scrollTop + 40;
            const items = col.getElementsByClassName('picker-item');
            Array.from(items).forEach(item => {
                const itemCenter = item.offsetTop + 20;
                item.classList.toggle('active', Math.abs(center - itemCenter) < 20);
            });
        });
    };

    createPicker(hCol, 23); createPicker(mCol, 59); createPicker(sCol, 59);

    const setVal = (col, val) => {
        col.scrollTo({ top: val * 40, behavior: 'auto' });
    };

    setTimeout(() => { setVal(mCol, 3); setVal(sCol, 0); }, 100);

    let isDragging = false;
    let currentMode = 'm';

    touchArea.addEventListener('touchstart', (e) => {
        if (pickerUI.contains(e.target)) return;
        const rect = touchArea.getBoundingClientRect();
        currentMode = (e.touches[0].clientX > rect.left + rect.width / 2) ? 's' : 'm';
        isDragging = true;
        handleTouch(e.touches[0]);
    });

    touchArea.addEventListener('touchmove', (e) => {
        if (!isDragging || timerId) return;
        handleTouch(e.touches[0]);
    });

    touchArea.addEventListener('touchend', () => isDragging = false);

    function handleTouch(touch) {
        const rect = touchArea.getBoundingClientRect();
        const x = touch.clientX - (rect.left + rect.width / 2);
        const y = touch.clientY - (rect.top + rect.height / 2);
        let angle = (Math.atan2(y, x) * (180 / Math.PI) + 450) % 360; 
        setVal(currentMode === 's' ? sCol : mCol, Math.floor(angle / 6));
    }

    document.getElementById('startBtn').onclick = () => {
        // iPhoneでの再生制限を解除するためのダミー再生
        alarmAudio.play();
        alarmAudio.pause();
        alarmAudio.currentTime = 0;

        if (timerId) return;
        const getVal = (col) => {
            const active = col.querySelector('.active');
            return active ? parseInt(active.textContent) || 0 : 0;
        };
        let timeLeft = getVal(hCol) * 3600 + getVal(mCol) * 60 + getVal(sCol);
        if (timeLeft <= 0) return;
        
        pickerUI.style.pointerEvents = "none";
        timerId = setInterval(() => {
            timeLeft--;
            setVal(hCol, Math.floor(timeLeft / 3600));
            setVal(mCol, Math.floor((timeLeft % 3600) / 60));
            setVal(sCol, timeLeft % 60);
            if (timeLeft <= 0) {
                onTimerComplete(); // タイマー終了
            }
        }, 1000);
    };

    document.getElementById('close-notif').onclick = stopEverything;
    document.getElementById('stopBtn').onclick = stopEverything;
    document.getElementById('resetBtn').onclick = () => location.reload();
</script>
</body>
</html>
