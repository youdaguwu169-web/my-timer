<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grand Mission Timer</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-red: #ff4757;
            --bg-dark: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.85);
        }

        body {
            font-family: 'Courier New', sans-serif;
            background-color: var(--bg-dark);
            background: radial-gradient(circle at center, #1a1f25 0%, #0d1117 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            overflow: hidden;
            touch-action: none;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        .timer-container {
            position: relative;
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 外側の数字レイアウト（サイズ調整） */
        .dial-outer {
            position: relative;
            width: 360px; /* ここを大きくしました */
            height: 360px; /* ここを大きくしました */
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #watch-dial {
            position: absolute;
            width: 310px; /* 円を大きくしました */
            height: 310px; /* 円を大きくしました */
            border-radius: 50%;
            border: 6px solid #30363d; /* 枠線を少し太く */
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3), inset 0 0 20px rgba(0, 0, 0, 0.6);
            background: rgba(22, 27, 34, 0.6);
        }

        .dial-label {
            position: absolute;
            color: var(--neon-blue);
            font-size: 22px; /* 数字を少し大きく */
            font-weight: bold;
            text-shadow: 0 0 10px var(--neon-blue);
            z-index: 5;
        }
        /* 数字の位置調整 */
        .label-0  { top: -10px; }
        .label-15 { right: -10px; top: 50%; transform: translateY(-50%); }
        .label-30 { bottom: -10px; }
        .label-45 { left: -10px; top: 50%; transform: translateY(-50%); }

        /* ドラムロールエリア */
        .picker-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            z-index: 10;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 25px;
            border: 1px solid #30363d;
            backdrop-filter: blur(8px);
        }

        .picker-column {
            height: 120px;
            overflow-y: scroll;
            width: 70px;
            scrollbar-width: none;
            scroll-snap-type: y mandatory;
        }
        .picker-column::-webkit-scrollbar { display: none; }
        
        .picker-item {
            height: 40px;
            line-height: 40px;
            font-size: 26px;
            color: #484f58;
            scroll-snap-align: center;
            transition: color 0.2s;
        }
        .picker-item.active {
            color: var(--neon-blue);
            font-weight: bold;
            font-size: 34px;
            text-shadow: 0 0 15px var(--neon-blue);
        }

        .unit { font-size: 16px; color: #8b949e; margin-left: 2px; }

        .progress-fixed {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 12px;
            background: #161b22;
        }
        #progress-bar {
            width: 100%; height: 100%;
            background: linear-gradient(90deg, #00d2ff, #00ff88);
            box-shadow: 0 -3px 15px var(--neon-blue);
            transition: width 1s linear;
        }

        .button-group {
            display: flex;
            gap: 15px;
            padding: 0 15px;
        }
        button {
            flex: 1;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #30363d;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #startBtn { background: #238636; color: white; border: none; box-shadow: 0 0 20px rgba(35, 134, 54, 0.5); }
        #stopBtn { background: #d29922; color: white; border: none; }
        #resetBtn { background: transparent; color: #8b949e; }

        .complete-text { color: #00ff00; font-size: 32px; text-shadow: 0 0 30px #00ff00; }
    </style>
</head>
<body>

<div class="scanline"></div>

<div class="timer-container">
    <div class="dial-outer" id="touch-area">
        <div class="dial-label label-0">60</div>
        <div class="dial-label label-15">15</div>
        <div class="dial-label label-30">30</div>
        <div class="dial-label label-45">45</div>
        
        <div id="watch-dial"></div>
        
        <div class="picker-group" id="picker-ui">
            <div class="picker-column" id="h-col"></div><span class="unit">H</span>
            <div class="picker-column" id="m-col"></div><span class="unit">M</span>
            <div class="picker-column" id="s-col"></div><span class="unit">S</span>
        </div>
    </div>

    <div class="button-group">
        <button id="startBtn">Initiate</button>
        <button id="stopBtn">Abort</button>
        <button id="resetBtn">Reset</button>
    </div>
</div>

<div class="progress-fixed">
    <div id="progress-bar"></div>
</div>

<script>
    let timerId = null;
    let totalTime = 0;
    const hCol = document.getElementById('h-col');
    const mCol = document.getElementById('m-col');
    const sCol = document.getElementById('s-col');
    const pickerUI = document.getElementById('picker-ui');

    const createPicker = (col, max) => {
        col.innerHTML = '<div class="picker-item"></div>'; 
        for (let i = 0; i <= max; i++) {
            const div = document.createElement('div');
            div.className = 'picker-item';
            div.textContent = i.toString().padStart(2, '0');
            col.appendChild(div);
        }
        col.innerHTML += '<div class="picker-item"></div>';
        col.addEventListener('scroll', () => updateActive(col));
    };

    const updateActive = (col) => {
        const center = col.scrollTop + 60;
        const items = col.getElementsByClassName('picker-item');
        Array.from(items).forEach(item => {
            const itemCenter = item.offsetTop + 20;
            item.classList.toggle('active', Math.abs(center - itemCenter) < 20);
        });
    };

    createPicker(hCol, 23); createPicker(mCol, 59); createPicker(sCol, 59);

    const getVal = (col) => {
        const active = col.querySelector('.active');
        return active ? parseInt(active.textContent) || 0 : 0;
    };

    const setVal = (col, val) => {
        col.scrollTo({ top: val * 40, behavior: 'auto' });
    };

    // 初期値
    setTimeout(() => { setVal(mCol, 3); setVal(sCol, 0); }, 100);

    // なぞる操作の処理
    let isDragging = false;
    const touchArea = document.getElementById('touch-area');

    touchArea.addEventListener('touchstart', (e) => {
        if (pickerUI.contains(e.target)) return;
        isDragging = true;
        handleTouch(e.touches[0]);
    });

    touchArea.addEventListener('touchmove', (e) => {
        if (!isDragging || timerId) return;
        handleTouch(e.touches[0]);
    });

    touchArea.addEventListener('touchend', () => isDragging = false);

    function handleTouch(touch) {
        const rect = touchArea.getBoundingClientRect();
        const x = touch.clientX - (rect.left + rect.width / 2);
        const y = touch.clientY - (rect.top + rect.height / 2);
        let angle = Math.atan2(y, x) * (180 / Math.PI);
        angle = (angle + 450) % 360; 
        let minute = Math.floor(angle / 6); 
        setVal(mCol, minute);
    }

    // 通知関連
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    const showNotification = () => {
        if (Notification.permission === "granted") {
            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification("MISSION COMPLETE", {
                    body: "Operation successfully finished.", icon: "icon.png"
                });
            });
        }
    };

    document.getElementById('startBtn').onclick = async () => {
        await Notification.requestPermission();
        if (timerId) return;
        let timeLeft = getVal(hCol) * 3600 + getVal(mCol) * 60 + getVal(sCol);
        if (timeLeft <= 0) return;
        totalTime = timeLeft;
        pickerUI.style.pointerEvents = "none";
        
        timerId = setInterval(() => {
            timeLeft--;
            setVal(hCol, Math.floor(timeLeft / 3600));
            setVal(mCol, Math.floor((timeLeft % 3600) / 60));
            setVal(sCol, timeLeft % 60);
            document.getElementById('progress-bar').style.width = (timeLeft / totalTime * 100) + "%";
            if (timeLeft <= 0) {
                clearInterval(timerId);
                timerId = null;
                showNotification();
                document.querySelector('.timer-container').innerHTML = '<div class="complete-text">MISSION COMPLETE</div>';
                setTimeout(() => location.reload(), 5000);
            }
        }, 1000);
    };

    document.getElementById('stopBtn').onclick = () => {
        clearInterval(timerId);
        timerId = null;
        pickerUI.style.pointerEvents = "auto";
    };

    document.getElementById('resetBtn').onclick = () => location.reload();
</script>
</body>
</html>
