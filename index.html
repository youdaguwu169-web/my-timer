<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grand Mission Timer</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --bg-dark: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.9);
        }

        body {
            font-family: 'Courier New', sans-serif;
            background: radial-gradient(circle at center, #1a1f25 0%, #0d1117 100%) fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            overflow: hidden;
            touch-action: none;
        }

        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .dial-outer {
            position: relative;
            width: min(92vw, 420px); 
            height: min(92vw, 420px);
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #watch-dial {
            position: absolute;
            width: 72%;
            height: 72%;
            border-radius: 50%;
            border: 4px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue), inset 0 0 15px var(--neon-blue);
            pointer-events: none; /* ダイヤル自体は触らせない */
        }

        .dial-label {
            position: absolute;
            color: var(--neon-blue);
            font-size: min(5.5vw, 22px);
            font-weight: bold;
            text-shadow: 0 0 10px var(--neon-blue);
            z-index: 5;
            pointer-events: none;
        }
        
        .label-0  { top: 5%; }
        .label-15 { right: 5%; top: 50%; transform: translateY(-50%); }
        .label-30 { bottom: 5%; }
        .label-45 { left: 5%; top: 50%; transform: translateY(-50%); }

        .picker-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            z-index: 20; /* ドラッグエリアより上に配置 */
            background: var(--panel-bg);
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #30363d;
            backdrop-filter: blur(10px);
            width: min(50vw, 190px);
        }

        .picker-column {
            height: 80px;
            overflow-y: scroll;
            width: 40px;
            scrollbar-width: none;
            scroll-snap-type: y mandatory;
        }
        .picker-column::-webkit-scrollbar { display: none; }
        
        .picker-item {
            height: 40px;
            line-height: 40px;
            font-size: 18px;
            color: #484f58;
            scroll-snap-align: center;
        }
        .picker-item.active {
            color: var(--neon-blue);
            font-weight: bold;
            font-size: 24px;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .button-group {
            display: flex;
            gap: 10px;
            width: 80%;
        }
        button {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
        }
        #startBtn { background: #238636; }
        #stopBtn { background: #d29922; }
        #resetBtn { background: #30363d; color: #8b949e; }

        #in-app-notif {
            display: none;
            position: fixed;
            top: env(safe-area-inset-top, 20px);
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: var(--panel-bg);
            border: 2px solid var(--neon-blue);
            border-radius: 15px;
            padding: 15px;
            z-index: 3000;
            box-shadow: 0 0 20px var(--neon-blue);
            text-align: center;
        }
    </style>
</head>
<body>

<audio id="alarm-audio" src="alarm.mp3" preload="auto" loop></audio>

<div id="in-app-notif">
    <h3 style="margin:0; color:var(--neon-blue)">MISSION COMPLETE</h3>
    <button onclick="resetTimer()" style="margin-top:10px; padding:8px 25px; background:var(--neon-blue); color:black; border-radius:8px; border:none; font-weight:bold;">STOP ALARM</button>
</div>

<div class="timer-container">
    <div class="dial-outer" id="touch-area">
        <div class="dial-label label-0">60</div>
        <div class="dial-label label-15">15</div>
        <div class="dial-label label-30">30</div>
        <div class="dial-label label-45">45</div>
        <div id="watch-dial"></div>
        <div class="picker-group" id="picker-ui">
            <div class="picker-column" id="h-col"></div>
            <div class="picker-column" id="m-col"></div>
            <div class="picker-column" id="s-col"></div>
        </div>
    </div>
    <div class="button-group">
        <button id="startBtn">Initiate</button>
        <button id="stopBtn">Abort</button>
        <button id="resetBtn">Reset</button>
    </div>
</div>

<script>
    let timerId = null;
    let remainSeconds = 0;
    const alarmAudio = document.getElementById('alarm-audio');
    const pickerUI = document.getElementById('picker-ui');
    const cols = { h: document.getElementById('h-col'), m: document.getElementById('m-col'), s: document.getElementById('s-col') };

    const createPicker = (col, max) => {
        col.innerHTML = '<div class="picker-item"></div>'; 
        for (let i = 0; i <= max; i++) {
            const div = document.createElement('div');
            div.className = 'picker-item';
            div.textContent = i.toString().padStart(2, '0');
            col.appendChild(div);
        }
        col.innerHTML += '<div class="picker-item"></div>';
        col.onscroll = () => {
            const center = col.scrollTop + 40;
            Array.from(col.children).forEach(item => {
                const itemCenter = item.offsetTop + 20;
                if (Math.abs(center - itemCenter) < 20) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        };
    };

    createPicker(cols.h, 23); createPicker(cols.m, 59); createPicker(cols.s, 59);

    const updateDisplay = (total, behavior = 'smooth') => {
        cols.h.scrollTo({ top: Math.floor(total / 3600) * 40, behavior: behavior });
        cols.m.scrollTo({ top: Math.floor((total % 3600) / 60) * 40, behavior: behavior });
        cols.s.scrollTo({ top: (total % 60) * 40, behavior: behavior });
    };

    function abortTimer() {
        clearInterval(timerId);
        timerId = null;
        alarmAudio.pause();
        pickerUI.style.pointerEvents = 'auto';
    }

    function resetTimer() {
        location.reload();
    }

    document.getElementById('startBtn').onclick = () => {
        if (timerId) return;

        // ピッカーから最新の時間を取得（中断中ならそれを使う）
        if (remainSeconds <= 0) {
            const getVal = (col) => {
                const items = Array.from(col.children);
                const active = items.find(i => i.classList.contains('active'));
                return active ? parseInt(active.textContent) || 0 : 0;
            };
            remainSeconds = getVal(cols.h) * 3600 + getVal(cols.m) * 60 + getVal(cols.s);
        }
        
        if (remainSeconds <= 0) return;

        alarmAudio.play().then(() => { alarmAudio.pause(); alarmAudio.currentTime = 0; });
        pickerUI.style.pointerEvents = 'none';

        // 開始直後に表示を一度更新（1分減るバグ回避）
        updateDisplay(remainSeconds);

        timerId = setInterval(() => {
            remainSeconds--;
            updateDisplay(remainSeconds);

            if (remainSeconds <= 0) {
                clearInterval(timerId);
                timerId = null;
                alarmAudio.play();
                document.getElementById('in-app-notif').style.display = 'block';
                if (Notification.permission === 'granted') {
                    new Notification('Grand Mission Timer', { body: 'MISSION COMPLETE' });
                }
            }
        }, 1000);

        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({ title: 'Grand Mission Timer', artist: 'Active' });
            navigator.mediaSession.setActionHandler('pause', resetTimer);
        }
    };

    document.getElementById('stopBtn').onclick = abortTimer;
    document.getElementById('resetBtn').onclick = resetTimer;

    // タッチ操作の干渉回避
    const touchArea = document.getElementById('touch-area');
    touchArea.addEventListener('touchstart', (e) => {
        if (timerId || pickerUI.contains(e.target)) return; // ピッカーを触っている時はドラッグを無視
        
        const rect = touchArea.getBoundingClientRect();
        const mode = (e.touches[0].clientX > rect.left + rect.width / 2) ? cols.s : cols.m;
        
        const handle = (t) => {
            const x = t.clientX - (rect.left + rect.width / 2);
            const y = t.clientY - (rect.top + rect.height / 2);
            let angle = (Math.atan2(y, x) * (180 / Math.PI) + 450) % 360;
            const val = Math.floor(angle / 6);
            mode.scrollTo({ top: val * 40, behavior: 'auto' });
            remainSeconds = 0; // 手動操作したらカウントをクリア
        };

        handle(e.touches[0]);
        const move = (me) => handle(me.touches[0]);
        window.addEventListener('touchmove', move);
        window.addEventListener('touchend', () => window.removeEventListener('touchmove', move), {once:true});
    });

    // 初期表示
    setTimeout(() => { updateDisplay(180, 'auto'); }, 200);
</script>
</body>
</html>
