<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Timer</title>
    <style>
        /* --- デザインはそのまま維持 --- */
        body {
            font-family: 'Courier New', sans-serif;
            background-color: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            transition: background-color 0.5s;
            touch-action: manipulation;
        }
        .timer-card {
            background: #161b22;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            text-align: center;
            width: 90%;
            max-width: 500px;
            border: 1px solid #30363d;
        }
        .progress-container {
            width: 100%;
            height: 12px;
            background-color: #30363d;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        #progress-bar {
            width: 100%;
            height: 100%;
            background-color: #00d2ff;
            box-shadow: 0 0 10px #00d2ff;
            transition: width 1s linear, background-color 0.5s;
        }
        #display {
            font-size: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
        input[type="number"] {
            font-size: 32px;
            width: 70px;
            background: #0d1117;
            border: 2px solid #30363d;
            border-radius: 10px;
            text-align: center;
            color: #00d2ff;
            outline: none;
            font-family: inherit;
        }
        input:disabled { color: #8b949e; border-color: #21262d; }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        button {
            font-size: 16px;
            padding: 12px 20px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            flex: 1;
            min-width: 100px;
            transition: 0.3s;
        }
        #startBtn { background-color: #238636; color: white; }
        #stopBtn  { background-color: #d29922; color: white; }
        #resetBtn { background-color: #8b949e; color: white; }
        .hacking-glitch { animation: glitch-flash 0.5s ease-out; }
        @keyframes glitch-flash {
            0% { background-color: #00ff00; }
            50% { background-color: #000; }
            100% { background-color: #0d1117; }
        }
        .complete-text { color: #00ff00 !important; font-size: 28px !important; text-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>

    <div class="timer-card">
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div id="display">
            <input type="number" id="h" value="0" min="0" inputmode="numeric" pattern="\d*">時
            <input type="number" id="m" value="3" min="0" max="59" inputmode="numeric" pattern="\d*">分
            <input type="number" id="s" value="0" min="0" max="59" inputmode="numeric" pattern="\d*">秒
        </div>

        <div class="button-group">
            <button id="startBtn">START</button>
            <button id="stopBtn">ABORT</button>
            <button id="resetBtn">RESET</button>
        </div>
    </div>

    <script>
        let timerId = null;
        let totalTime = 0;

        // --- 通知設定 ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        const requestNotificationPermission = async () => {
            if (Notification.permission !== "granted") {
                await Notification.requestPermission();
            }
        };

        const showNotification = () => {
            if (Notification.permission === "granted") {
                navigator.serviceWorker.ready.then(registration => {
                    registration.showNotification("MISSION COMPLETE", {
                        body: "タイマーが終了しました。",
                        icon: "https://vercel.com/favicon.ico", // アイコンは自由に変更可能
                        vibrate: [200, 100, 200]
                    });
                });
            }
        };

        const getEl = () => ({
            h: document.getElementById('h'),
            m: document.getElementById('m'),
            s: document.getElementById('s'),
            bar: document.getElementById('progress-bar'),
            display: document.getElementById('display')
        });

        document.getElementById('startBtn').onclick = async () => {
            // スタート時に通知許可を求める
            await requestNotificationPermission();

            if (timerId) return;

            const el = getEl();
            let timeLeft = (parseInt(el.h.value) || 0) * 3600 + (parseInt(el.m.value) || 0) * 60 + (parseInt(el.s.value) || 0);

            if (timeLeft <= 0) return;

            totalTime = timeLeft;
            el.h.disabled = el.m.disabled = el.s.disabled = true;

            timerId = setInterval(() => {
                timeLeft--;

                el.h.value = Math.floor(timeLeft / 3600);
                el.m.value = Math.floor((timeLeft % 3600) / 60);
                el.s.value = timeLeft % 60;

                const ratio = (timeLeft / totalTime) * 100;
                el.bar.style.width = ratio + "%";

                if (ratio < 20) {
                    el.bar.style.backgroundColor = "#ff4757";
                } else if (ratio < 50) {
                    el.bar.style.backgroundColor = "#ffa502";
                }

                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    el.display.innerHTML = '<span class="complete-text">MISSION COMPLETE</span>';
                    document.body.classList.add('hacking-glitch');

                    // 通知を実行
                    showNotification();
                }
            }, 1000);
        };

        document.getElementById('stopBtn').onclick = () => {
            clearInterval(timerId);
            timerId = null;
            const el = getEl();
            if(el.h) el.h.disabled = el.m.disabled = el.s.disabled = false;
        };

        document.getElementById('resetBtn').onclick = () => {
            location.reload();
        };
    </script>
</body>
</html>
