<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grand Mission Timer</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --bg-dark: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.9);
        }

        body {
            font-family: 'Courier New', sans-serif;
            background: radial-gradient(circle at center, #1a1f25 0%, #0d1117 100%) fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            overflow: hidden;
            touch-action: none;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .dial-outer {
            position: relative;
            width: min(92vw, 400px); 
            height: min(92vw, 400px);
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #watch-dial {
            position: absolute;
            width: 80%;
            height: 80%;
            border-radius: 50%;
            border: 4px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue), inset 0 0 15px var(--neon-blue);
            background: transparent;
        }

        .dial-label {
            position: absolute;
            color: var(--neon-blue);
            font-size: min(5vw, 20px);
            font-weight: bold;
            text-shadow: 0 0 10px var(--neon-blue);
            z-index: 5;
        }
        
        /* 数字を円のより内側に寄せて、パネルともぶつからない位置(12%)に調整 */
        .label-0  { top: 12%; }
        .label-15 { right: 12%; top: 50%; transform: translateY(-50%); }
        .label-30 { bottom: 12%; }
        .label-45 { left: 12%; top: 50%; transform: translateY(-50%); }

        /* 真ん中の図形を小さくしました */
        .picker-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            z-index: 10;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid #30363d;
            backdrop-filter: blur(10px);
            width: min(55vw, 210px); /* 幅をさらに縮小 */
        }

        .picker-column {
            height: 80px;
            overflow-y: scroll;
            width: 45px;
            scrollbar-width: none;
            scroll-snap-type: y mandatory;
        }
        .picker-column::-webkit-scrollbar { display: none; }
        
        .picker-item {
            height: 40px;
            line-height: 40px;
            font-size: 20px;
            color: #484f58;
            scroll-snap-align: center;
        }
        .picker-item.active {
            color: var(--neon-blue);
            font-weight: bold;
            font-size: 26px;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .button-group {
            display: flex;
            gap: 10px;
            width: 80%;
        }
        button {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #30363d;
            font-weight: bold;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
        }
        #startBtn { background: #238636; }
        #stopBtn { background: #d29922; }
        #resetBtn { background: transparent; color: #8b949e; }
    </style>
</head>
<body>

<div class="scanline"></div>

<div class="timer-container">
    <div class="dial-outer" id="touch-area">
        <div class="dial-label label-0">60</div>
        <div class="dial-label label-15">15</div>
        <div class="dial-label label-30">30</div>
        <div class="dial-label label-45">45</div>
        <div id="watch-dial"></div>
        <div class="picker-group" id="picker-ui">
            <div class="picker-column" id="h-col"></div><span style="font-size:12px;color:#8b949e">H</span>
            <div class="picker-column" id="m-col"></div><span style="font-size:12px;color:#8b949e">M</span>
            <div class="picker-column" id="s-col"></div><span style="font-size:12px;color:#8b949e">S</span>
        </div>
    </div>
    <div class="button-group">
        <button id="startBtn">Initiate</button>
        <button id="stopBtn">Abort</button>
        <button id="resetBtn">Reset</button>
    </div>
</div>

<script>
    let timerId = null;
    const hCol = document.getElementById('h-col');
    const mCol = document.getElementById('m-col');
    const sCol = document.getElementById('s-col');
    const pickerUI = document.getElementById('picker-ui');
    const touchArea = document.getElementById('touch-area');

    // 音声
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function beep() {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'square'; o.frequency.value = 880;
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        o.start(); o.stop(audioCtx.currentTime + 0.1);
    }

    const createPicker = (col, max) => {
        col.innerHTML = '<div class="picker-item"></div>'; 
        for (let i = 0; i <= max; i++) {
            const div = document.createElement('div');
            div.className = 'picker-item';
            div.textContent = i.toString().padStart(2, '0');
            col.appendChild(div);
        }
        col.innerHTML += '<div class="picker-item"></div>';
        col.addEventListener('scroll', () => {
            const center = col.scrollTop + 40;
            const items = col.getElementsByClassName('picker-item');
            Array.from(items).forEach(item => {
                const itemCenter = item.offsetTop + 20;
                item.classList.toggle('active', Math.abs(center - itemCenter) < 20);
            });
        });
    };

    createPicker(hCol, 23); createPicker(mCol, 59); createPicker(sCol, 59);

    const getVal = (col) => {
        const active = col.querySelector('.active');
        return active ? parseInt(active.textContent) || 0 : 0;
    };

    const setVal = (col, val) => {
        col.scrollTo({ top: val * 40, behavior: 'auto' });
    };

    setTimeout(() => { setVal(mCol, 3); setVal(sCol, 0); }, 100);

    // タッチ操作ロジック
    let isDragging = false;
    touchArea.addEventListener('touchstart', (e) => {
        if (pickerUI.contains(e.target)) return;
        isDragging = true; handleTouch(e.touches[0]);
    });
    touchArea.addEventListener('touchmove', (e) => {
        if (!isDragging || timerId) return;
        handleTouch(e.touches[0]);
    });
    touchArea.addEventListener('touchend', () => isDragging = false);

    function handleTouch(touch) {
        const rect = touchArea.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const x = touch.clientX - centerX;
        const y = touch.clientY - centerY;
        
        let angle = Math.atan2(y, x) * (180 / Math.PI);
        angle = (angle + 450) % 360; 
        const value = Math.floor(angle / 6);

        // 画面の右半分を触っていれば「秒」、左半分なら「分」を変更
        if (touch.clientX > centerX) {
            setVal(sCol, value);
        } else {
            setVal(mCol, value);
        }
    }

    document.getElementById('startBtn').onclick = () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (timerId) return;
        let timeLeft = getVal(hCol) * 3600 + getVal(mCol) * 60 + getVal(sCol);
        if (timeLeft <= 0) return;
        pickerUI.style.pointerEvents = "none";
        timerId = setInterval(() => {
            timeLeft--;
            setVal(hCol, Math.floor(timeLeft / 3600));
            setVal(mCol, Math.floor((timeLeft % 3600) / 60));
            setVal(sCol, timeLeft % 60);
            if (timeLeft <= 0) {
                clearInterval(timerId); timerId = null;
                for(let i=0; i<5; i++) setTimeout(beep, i*250);
                alert("MISSION COMPLETE"); location.reload();
            }
        }, 1000);
    };

    document.getElementById('stopBtn').onclick = () => {
        clearInterval(timerId); timerId = null;
        pickerUI.style.pointerEvents = "auto";
    };
    document.getElementById('resetBtn').onclick = () => location.reload();
</script>
</body>
</html>
