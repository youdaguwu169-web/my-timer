<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission Timer v2</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">
    <style>
        body {
            font-family: 'Courier New', sans-serif;
            background-color: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            overflow: hidden;
            touch-action: none;
        }
        .timer-card {
            background: #161b22;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
            text-align: center;
            width: 85%;
            max-width: 400px;
            border: 1px solid #30363d;
        }
        .dial-outer {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 時計のフレームと目盛り */
        #watch-dial {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #30363d;
            box-sizing: border-box;
            background: radial-gradient(circle, #1c2128 60%, #161b22 100%);
        }
        /* 目盛り数字 (0, 15, 30, 45) */
        .dial-label {
            position: absolute;
            color: #8b949e;
            font-size: 14px;
            font-weight: bold;
        }
        .label-0  { top: 15px; }
        .label-15 { right: 15px; }
        .label-30 { bottom: 15px; }
        .label-45 { left: 15px; }

        /* 中央のドラムロールエリア */
        .picker-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            z-index: 10;
            background: rgba(13, 17, 23, 0.6);
            padding: 10px;
            border-radius: 15px;
            pointer-events: auto; /* ここだけスワイプを許可 */
        }
        .picker-column {
            height: 120px;
            overflow-y: scroll;
            width: 55px;
            scrollbar-width: none;
            scroll-snap-type: y mandatory;
        }
        .picker-column::-webkit-scrollbar { display: none; }
        .picker-item {
            height: 40px;
            line-height: 40px;
            font-size: 22px;
            color: #484f58;
            scroll-snap-align: center;
        }
        .picker-item.active {
            color: #00d2ff;
            font-weight: bold;
            font-size: 30px;
            text-shadow: 0 0 10px #00d2ff;
        }
        .unit { font-size: 12px; color: #8b949e; margin-right: 2px; }

        .progress-container {
            width: 100%; height: 8px;
            background-color: #30363d;
            border-radius: 10px; margin-bottom: 20px;
            overflow: hidden;
        }
        #progress-bar {
            width: 100%; height: 100%;
            background-color: #00d2ff;
            transition: width 1s linear;
        }
        .button-group { display: flex; gap: 10px; }
        button {
            flex: 1; padding: 15px; border-radius: 10px; border: none;
            font-weight: bold; cursor: pointer;
        }
        #startBtn { background: #238636; color: white; }
        #stopBtn { background: #d29922; color: white; }
        #resetBtn { background: #30363d; color: white; }
    </style>
</head>
<body>

<div class="timer-card">
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div class="dial-outer" id="touch-area">
        <div id="watch-dial"></div>
        <div class="dial-label label-0">0</div>
        <div class="dial-label label-15">15</div>
        <div class="dial-label label-30">30</div>
        <div class="dial-label label-45">45</div>
        
        <div class="picker-group" id="picker-ui">
            <div class="picker-column" id="h-col"></div><span class="unit">h</span>
            <div class="picker-column" id="m-col"></div><span class="unit">m</span>
            <div class="picker-column" id="s-col"></div><span class="unit">s</span>
        </div>
    </div>

    <div class="button-group">
        <button id="startBtn">START</button>
        <button id="stopBtn">ABORT</button>
        <button id="resetBtn">RESET</button>
    </div>
</div>

<script>
    let timerId = null;
    let totalTime = 0;
    const hCol = document.getElementById('h-col');
    const mCol = document.getElementById('m-col');
    const sCol = document.getElementById('s-col');

    const createPicker = (col, max) => {
        col.innerHTML = '<div class="picker-item"></div>'; 
        for (let i = 0; i <= max; i++) {
            const div = document.createElement('div');
            div.className = 'picker-item';
            div.textContent = i;
            col.appendChild(div);
        }
        col.innerHTML += '<div class="picker-item"></div>';
        col.addEventListener('scroll', () => updateActive(col));
    };

    const updateActive = (col) => {
        const center = col.scrollTop + 60;
        const items = col.getElementsByClassName('picker-item');
        Array.from(items).forEach(item => {
            const itemCenter = item.offsetTop + 20;
            item.classList.toggle('active', Math.abs(center - itemCenter) < 20);
        });
    };

    createPicker(hCol, 23); createPicker(mCol, 59); createPicker(sCol, 59);

    const getVal = (col) => {
        const active = col.querySelector('.active');
        return active ? parseInt(active.textContent) || 0 : 0;
    };

    const setVal = (col, val) => {
        col.scrollTo({ top: val * 40, behavior: 'auto' });
    };

    // 初期位置設定
    setTimeout(() => { setVal(mCol, 3); }, 100);

    // 外側の円をなぞる操作
    let isDragging = false;
    const touchArea = document.getElementById('touch-area');
    const pickerUI = document.getElementById('picker-ui');

    touchArea.addEventListener('touchstart', (e) => {
        // ドラムロール部分を触っている時は「なぞる」を無効化
        if (pickerUI.contains(e.target)) return;
        isDragging = true;
        handleCircleTouch(e.touches[0]);
    });

    touchArea.addEventListener('touchmove', (e) => {
        if (!isDragging || timerId) return;
        handleCircleTouch(e.touches[0]);
    });

    touchArea.addEventListener('touchend', () => isDragging = false);

    function handleCircleTouch(touch) {
        const rect = touchArea.getBoundingClientRect();
        const x = touch.clientX - (rect.left + rect.width / 2);
        const y = touch.clientY - (rect.top + rect.height / 2);
        let angle = Math.atan2(y, x) * (180 / Math.PI);
        angle = (angle + 450) % 360; // 0度を真上に調整
        let minute = Math.floor(angle / 6); // 360度 / 60分 = 6度
        setVal(mCol, minute);
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    const showNotification = () => {
        if (Notification.permission === "granted") {
            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification("MISSION COMPLETE", {
                    body: "タイマーが終了しました", icon: "icon.png"
                });
            });
        }
    };

    document.getElementById('startBtn').onclick = async () => {
        await Notification.requestPermission();
        if (timerId) return;
        let timeLeft = getVal(hCol) * 3600 + getVal(mCol) * 60 + getVal(sCol);
        if (timeLeft <= 0) return;
        totalTime = timeLeft;
        pickerUI.style.pointerEvents = "none";
        
        timerId = setInterval(() => {
            timeLeft--;
            setVal(hCol, Math.floor(timeLeft / 3600));
            setVal(mCol, Math.floor((timeLeft % 3600) / 60));
            setVal(sCol, timeLeft % 60);
            document.getElementById('progress-bar').style.width = (timeLeft / totalTime * 100) + "%";
            if (timeLeft <= 0) {
                clearInterval(timerId);
                timerId = null;
                showNotification();
                alert("MISSION COMPLETE");
            }
        }, 1000);
    };

    document.getElementById('stopBtn').onclick = () => {
        clearInterval(timerId);
        timerId = null;
        pickerUI.style.pointerEvents = "auto";
    };

    document.getElementById('resetBtn').onclick = () => location.reload();
</script>
</body>
</html>
