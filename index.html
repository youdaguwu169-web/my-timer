<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission Timer</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">
    <style>
        body {
            font-family: 'Courier New', sans-serif;
            background-color: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            overflow: hidden;
            touch-action: none;
        }
        .timer-card {
            background: #161b22;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
            text-align: center;
            width: 85%;
            max-width: 400px;
            border: 1px solid #30363d;
        }
        .dial-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #watch-dial {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #30363d;
            box-shadow: inset 0 0 20px rgba(0, 210, 255, 0.1);
        }
        .picker-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }
        .picker-column {
            height: 120px;
            overflow-y: scroll;
            width: 60px;
            scrollbar-width: none;
            -ms-overflow-style: none;
            scroll-snap-type: y mandatory;
        }
        .picker-column::-webkit-scrollbar { display: none; }
        .picker-item {
            height: 40px;
            line-height: 40px;
            font-size: 24px;
            color: #8b949e;
            scroll-snap-align: center;
            transition: 0.2s;
        }
        .picker-item.active {
            color: #00d2ff;
            font-weight: bold;
            font-size: 32px;
            text-shadow: 0 0 10px #00d2ff;
        }
        .unit { font-size: 14px; color: #8b949e; }
        .progress-container {
            width: 100%;
            height: 8px;
            background-color: #30363d;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        #progress-bar {
            width: 100%; height: 100%;
            background-color: #00d2ff;
            transition: width 1s linear;
        }
        .button-group { display: flex; gap: 10px; }
        button {
            flex: 1; padding: 15px; border-radius: 10px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        #startBtn { background: #238636; color: white; }
        #stopBtn { background: #d29922; color: white; }
        #resetBtn { background: #30363d; color: white; }
        .complete-text { color: #00ff00; font-size: 24px; }
    </style>
</head>
<body>

<div class="timer-card">
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div class="dial-container" id="touch-area">
        <div id="watch-dial"></div>
        <div class="picker-group" id="display-ui">
            <div class="picker-column" id="h-col"></div><span class="unit">h</span>
            <div class="picker-column" id="m-col"></div><span class="unit">m</span>
            <div class="picker-column" id="s-col"></div><span class="unit">s</span>
        </div>
    </div>

    <div class="button-group">
        <button id="startBtn">START</button>
        <button id="stopBtn">ABORT</button>
        <button id="resetBtn">RESET</button>
    </div>
</div>

<script>
    let timerId = null;
    let totalTime = 0;
    const hCol = document.getElementById('h-col');
    const mCol = document.getElementById('m-col');
    const sCol = document.getElementById('s-col');

    const createPicker = (col, max) => {
        col.innerHTML = '<div class="picker-item"></div>'; 
        for (let i = 0; i <= max; i++) {
            const div = document.createElement('div');
            div.className = 'picker-item';
            div.textContent = i;
            col.appendChild(div);
        }
        col.innerHTML += '<div class="picker-item"></div>';
        col.onscroll = () => updateActive(col);
    };

    const updateActive = (col) => {
        const items = col.getElementsByClassName('picker-item');
        const center = col.scrollTop + 60;
        Array.from(items).forEach(item => {
            const itemCenter = item.offsetTop + 20;
            item.classList.toggle('active', Math.abs(center - itemCenter) < 20);
        });
    };

    createPicker(hCol, 23);
    createPicker(mCol, 59);
    createPicker(sCol, 59);

    const getVal = (col) => {
        const active = col.querySelector('.active');
        return active ? parseInt(active.textContent) || 0 : 0;
    };

    const setVal = (col, val) => {
        col.scrollTo({ top: val * 40, behavior: 'smooth' });
    };

    let startAngle = 0;
    let startVal = 0;
    document.getElementById('touch-area').addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        const rect = e.currentTarget.getBoundingClientRect();
        const x = touch.clientX - (rect.left + rect.width / 2);
        const y = touch.clientY - (rect.top + rect.height / 2);
        startAngle = Math.atan2(y, x);
        startVal = getVal(mCol);
    });

    document.getElementById('touch-area').addEventListener('touchmove', (e) => {
        if (timerId) return;
        const touch = e.touches[0];
        const rect = e.currentTarget.getBoundingClientRect();
        const x = touch.clientX - (rect.left + rect.width / 2);
        const y = touch.clientY - (rect.top + rect.height / 2);
        const currentAngle = Math.atan2(y, x);
        let diff = Math.round((currentAngle - startAngle) * (60 / (Math.PI * 2)));
        let newVal = (startVal + diff + 60) % 60;
        setVal(mCol, newVal);
    });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    const showNotification = () => {
        if (Notification.permission === "granted") {
            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification("MISSION COMPLETE", {
                    body: "タイマー終了", icon: "icon.png", badge: "icon.png"
                });
            });
        }
    };

    document.getElementById('startBtn').onclick = async () => {
        await Notification.requestPermission();
        if (timerId) return;
        let timeLeft = getVal(hCol) * 3600 + getVal(mCol) * 60 + getVal(sCol);
        if (timeLeft <= 0) return;
        totalTime = timeLeft;
        hCol.style.pointerEvents = mCol.style.pointerEvents = sCol.style.pointerEvents = "none";
        
        timerId = setInterval(() => {
            timeLeft--;
            setVal(hCol, Math.floor(timeLeft / 3600));
            setVal(mCol, Math.floor((timeLeft % 3600) / 60));
            setVal(sCol, timeLeft % 60);
            const ratio = (timeLeft / totalTime) * 100;
            document.getElementById('progress-bar').style.width = ratio + "%";
            if (timeLeft <= 0) {
                clearInterval(timerId);
                timerId = null;
                showNotification();
                document.getElementById('display-ui').innerHTML = '<div class="complete-text">COMPLETE</div>';
            }
        }, 1000);
    };

    document.getElementById('stopBtn').onclick = () => {
        clearInterval(timerId);
        timerId = null;
        hCol.style.pointerEvents = mCol.style.pointerEvents = sCol.style.pointerEvents = "auto";
    };

    document.getElementById('resetBtn').onclick = () => location.reload();
</script>
</body>
</html>
